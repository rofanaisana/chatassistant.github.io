<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메신저 대화 백업 도구 — 소설 창작 보조 도구</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-wrapper">
    <!-- Header -->
    <header class="page-header">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-chevron-left"></i> 메인으로
      </a>
      <h1>📱 메신저 대화 백업 도구</h1>
    </header>

    <!-- Mobile Tabs -->
    <div class="mobile-tabs">
      <button class="mobile-tab-btn active" data-tab="editor" onclick="switchTab('editor')">
        <i class="fa-solid fa-pen-to-square"></i> 편집
      </button>
      <button class="mobile-tab-btn" data-tab="preview" onclick="switchTab('preview')">
        <i class="fa-solid fa-eye"></i> 미리보기
      </button>
    </div>

    <div class="split-layout">
      <!-- ===== LEFT: EDITOR ===== -->
      <div class="editor-panel" id="editorPanel">

        <!-- 채팅방 설정 -->
        <div class="section-block">
          <div class="section-title"><i class="fa-solid fa-comment-dots"></i> 채팅방 설정</div>
          <div class="form-group">
            <label class="form-label">채팅방 이름</label>
            <input type="text" id="roomName" class="form-input" placeholder="채팅방 이름 입력" value="우리의 이야기" oninput="renderPreview()" />
          </div>
          <div class="form-group">
            <label class="form-label">테마 선택</label>
            <select id="themeSelect" class="form-select" onchange="onThemeChange()">
              <option value="kakao">📲 카카오톡</option>
              <option value="line">💚 네이버 LINE</option>
              <option value="twitter">🐦 Twitter DM</option>
              <option value="light">☀️ Basic Light</option>
              <option value="dark">🌙 Basic Dark</option>
              <option value="custom">🎨 커스텀</option>
            </select>
          </div>
          <div id="customThemeOptions">
            <div class="color-picker-row">
              <label>배경색</label>
              <input type="color" id="customBg" value="#f0f2f5" oninput="renderPreview()" />
            </div>
            <div class="color-picker-row">
              <label>좌측 말풍선색</label>
              <input type="color" id="customLeftBubble" value="#e8f4fe" oninput="renderPreview()" />
            </div>
            <div class="color-picker-row">
              <label>좌측 글자색</label>
              <input type="color" id="customLeftText" value="#222222" oninput="renderPreview()" />
            </div>
            <div class="color-picker-row">
              <label>우측 말풍선색</label>
              <input type="color" id="customRightBubble" value="#c8e6ff" oninput="renderPreview()" />
            </div>
            <div class="color-picker-row">
              <label>우측 글자색</label>
              <input type="color" id="customRightText" value="#1a2c3d" oninput="renderPreview()" />
            </div>
            <div class="color-picker-row">
              <label>헤더 배경색</label>
              <input type="color" id="customHeaderBg" value="#4A90D9" oninput="renderPreview()" />
            </div>
          </div>
          <div class="form-group" style="margin-top:0.6rem;">
            <label class="form-label">글꼴 선택</label>
            <select id="fontSelect" class="form-select" onchange="renderPreview()">
              <option value="Pretendard">Pretendard (기본)</option>
              <option value="RIDIBatang">리디바탕</option>
              <option value="Nanum Gothic">나눔고딕</option>
              <option value="Nanum Myeongjo">나눔명조</option>
            </select>
          </div>
          <div class="form-group">
            <div class="toggle-row">
              <span class="toggle-label">
                <i class="fa-solid fa-pen-nib" style="color:#4A90D9;margin-right:4px;"></i>
                지문 + 대사 모드
              </span>
              <label class="toggle-switch">
                <input type="checkbox" id="actionModeToggle" checked onchange="renderPreview()" />
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="text-muted" style="margin-top:4px;">ON: 지문+대사 / OFF: 대사만 (Only Chat)</div>
          </div>
        </div>

        <!-- 캐릭터 설정 -->
        <div class="section-block">
          <div class="section-title"><i class="fa-solid fa-users"></i> 캐릭터 설정</div>
          <div id="characterList"></div>
          <button class="btn btn-primary btn-sm" id="addCharBtn" onclick="addCharacter()">
            <i class="fa-solid fa-plus"></i> 캐릭터 추가
          </button>
          <div class="text-muted" style="margin-top:6px;">최소 2인 / 최대 6인</div>
        </div>

        <!-- 대화 편집 -->
        <div class="section-block">
          <div class="section-title"><i class="fa-solid fa-list"></i> 대화 내용 편집</div>
          <div class="btn-group" style="margin-bottom:0.9rem;">
            <button class="btn btn-primary btn-sm" onclick="addMessage('chat')">
              <i class="fa-solid fa-comment"></i> 대사 추가
            </button>
            <button class="btn btn-warning btn-sm" id="addActionBtn" onclick="addMessage('action')">
              <i class="fa-solid fa-pen-nib"></i> 지문 추가
            </button>
            <button class="btn btn-success btn-sm" onclick="addMessage('scene')">
              <i class="fa-solid fa-location-dot"></i> 시스템 메시지 추가
            </button>
          </div>
          <div id="messageList">
            <div class="empty-state">
              <i class="fa-regular fa-comment-dots"></i>
              <p>메시지를 추가해 보세요</p>
            </div>
          </div>
        </div>

        <!-- 내보내기 -->
        <div class="export-section">
          <div class="section-title"><i class="fa-solid fa-share-nodes"></i> 내보내기</div>
          <div class="btn-group">
            <button class="btn btn-secondary btn-sm" onclick="copyHTML()">
              <i class="fa-solid fa-code"></i> HTML 복사
            </button>
            <button class="btn btn-secondary btn-sm" onclick="saveJSON()">
              <i class="fa-solid fa-download"></i> JSON 저장
            </button>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('loadFile').click()">
              <i class="fa-solid fa-upload"></i> 불러오기
            </button>
            <button class="btn btn-primary btn-sm" onclick="saveImage()">
              <i class="fa-solid fa-image"></i> 이미지 저장
            </button>
          </div>
          <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(event)" />
        </div>
      </div>

      <!-- ===== RIGHT: PREVIEW ===== -->
      <div class="preview-panel" id="previewPanel">
        <div class="preview-inner">
          <div id="messengerPreviewWrap" class="theme-kakao">
            <div class="messenger-preview" id="messengerPreview">
              <div class="messenger-header">
                <span class="room-name" id="previewRoomName">우리의 이야기</span>
              </div>
              <div class="messenger-body" id="previewBody">
                <div class="empty-state">
                  <i class="fa-regular fa-comment-dots"></i>
                  <p>대화를 추가하면 여기에 표시됩니다</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="js/messenger.js"></script>
</body>
</html>
