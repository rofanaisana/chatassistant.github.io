<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메신저 대화 — Chat Backup</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="split-page">
  <div class="page-wrapper">
    <header class="page-header">
      <a href="index.html" class="back-link">
        <i class="fa-solid fa-chevron-left"></i> 메인으로
      </a>
      <h1>📱 메신저 대화</h1>
    </header>

    <div class="mobile-tabs">
      <button class="mobile-tab-btn active" data-tab="editor" onclick="switchTab('editor')">
        <i class="fa-solid fa-pen-to-square"></i> 편집
      </button>
      <button class="mobile-tab-btn" data-tab="preview" onclick="switchTab('preview')">
        <i class="fa-solid fa-eye"></i> 미리보기
      </button>
    </div>

    <div class="split-layout">
      <div class="editor-panel" id="editorPanel">

        <div class="form-group" style="padding:0.85rem 1.4rem 0;">
          <label class="form-label">채팅방 이름</label>
          <input type="text" id="roomName" class="form-input" placeholder="채팅방 이름 입력" value="채팅방 이름" oninput="renderPreview()" />
        </div>

        <div class="accordion-section" id="accordionTheme">
          <div class="accordion-header" onclick="toggleAccordion('accordionTheme')">
            <span class="accordion-title"><i class="fa-solid fa-palette"></i> 테마 & 글꼴</span>
            <i class="fa-solid fa-chevron-down accordion-toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div class="form-group">
              <label class="form-label">테마 선택</label>
              <select id="themeSelect" class="form-select" onchange="onThemeChange()">
                <option value="kakao">📲 카카오톡</option>
                <option value="line">💚 네이버 LINE</option>
                <option value="twitter">🐦 Twitter DM</option>
                <option value="light">☀️ Basic Light</option>
                <option value="dark">🌙 Basic Dark</option>
                <option value="custom">🎨 커스텀</option>
              </select>
            </div>
            <div id="customThemeOptions">
              <div class="color-picker-row"><label>배경색</label><input type="color" id="customBg" value="#f0f2f5" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>좌측 말풍선색</label><input type="color" id="customLeftBubble" value="#e8f4fe" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>좌측 글자색</label><input type="color" id="customLeftText" value="#222222" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>우측 말풍선색</label><input type="color" id="customRightBubble" value="#c8e6ff" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>우측 글자색</label><input type="color" id="customRightText" value="#1a2c3d" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>헤더 배경색</label><input type="color" id="customHeaderBg" value="#4A90D9" oninput="renderPreview()" /></div>
              <div class="color-picker-row"><label>헤더 글자색</label><input type="color" id="customHeaderText" value="#ffffff" oninput="renderPreview()" /></div>
            </div>
            <div class="form-group" style="margin-top:0.6rem;">
              <label class="form-label">글꼴 선택</label>
              <select id="fontSelect" class="form-select" onchange="renderPreview()">
                <option value="Pretendard">Pretendard (기본)</option>
                <option value="RIDIBatang">리디바탕</option>
                <option value="Nanum Gothic">나눔고딕</option>
                <option value="Nanum Myeongjo">나눔명조</option>
              </select>
            </div>
          </div>
        </div>

        <div class="accordion-section" id="accordionCharacter">
          <div class="accordion-header" onclick="toggleAccordion('accordionCharacter')">
            <span class="accordion-title"><i class="fa-solid fa-users"></i> 캐릭터 설정</span>
            <i class="fa-solid fa-chevron-down accordion-toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div id="characterList"></div>
            <button class="btn btn-primary btn-sm" id="addCharBtn" onclick="addCharacter()">
              <i class="fa-solid fa-plus"></i> 캐릭터 추가
            </button>
            <div class="text-muted" style="margin-top:6px;">최소 2인 / 최대 6인</div>
          </div>
        </div>

        <div class="accordion-section" id="accordionMessages">
          <div class="accordion-header" onclick="toggleAccordion('accordionMessages')">
            <span class="accordion-title"><i class="fa-solid fa-list"></i> 대화 내용 편집</span>
            <i class="fa-solid fa-chevron-down accordion-toggle-icon"></i>
          </div>
          <div class="accordion-body">
            <div class="btn-group" style="margin-bottom:0.9rem;">
              <button class="btn btn-primary btn-sm" onclick="addMessage('chat')">
                <i class="fa-solid fa-comment"></i> 대사 추가
              </button>
              <button class="btn btn-warning btn-sm" onclick="addMessage('scene')">
                <i class="fa-solid fa-bell"></i> 시스템 메시지 추가
              </button>
              <button class="btn btn-danger btn-sm" onclick="clearAllMessages()">
                <i class="fa-solid fa-trash"></i> 전체삭제
              </button>
            </div>
            <div id="messageList">
              <div class="empty-state">
                <i class="fa-regular fa-comment-dots"></i>
                <p>메시지를 추가해 보세요</p>
              </div>
            </div>
          </div>
        </div>

        <div class="export-section">
          <div class="section-title"><i class="fa-solid fa-share-nodes"></i> 내보내기</div>
          <div class="btn-group">
            <button class="btn btn-secondary btn-sm" onclick="copyHTML()"><i class="fa-solid fa-code"></i> HTML 복사</button>
            <button class="btn btn-secondary btn-sm" onclick="saveJSON()"><i class="fa-solid fa-download"></i> JSON 저장</button>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('loadFile').click()"><i class="fa-solid fa-upload"></i> 불러오기</button>
            <button class="btn btn-primary btn-sm" onclick="saveImage()"><i class="fa-solid fa-image"></i> 이미지 저장</button>
          </div>
          <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(event)" />
        </div>
      </div>

      <div class="preview-panel" id="previewPanel">
        <div class="preview-inner">
          <div id="messengerPreviewWrap" class="theme-kakao">
            <div class="messenger-preview" id="messengerPreview">
              <div class="messenger-header">
                <span class="room-name" id="previewRoomName">채팅방 이름</span>
              </div>
              <div class="messenger-body" id="previewBody">
                <div class="empty-state">
                  <i class="fa-regular fa-comment-dots"></i>
                  <p>대화를 추가하면 여기에 표시됩니다</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="js/messenger.js"></script>
</body>
</html>
